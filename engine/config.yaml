# Stage 1 v2 Custom bot 설정 (사전 지정 파라미터 박제)
# 박제 출처: docs/candidate-pool.md v7, docs/stage1-v2-relaunch.md v2
# 변경 전 반드시 감사 기록 남길 것

run_mode: paper              # paper | live (초기 paper 고정)

pairs:
  # V2-06 페이퍼 트랙 (Sharpe>0.8 + DSR>0 박제, stake 100k)
  - ticker: KRW-BTC
    strategy: A              # Trend Following (MA200 + Donchian + Volume)
  - ticker: KRW-ETH
    strategy: A
  - ticker: KRW-BTC
    strategy: D              # Volatility Breakout (Keltner + Bollinger)

  # V2-Strategy-G 트랙 (활동 우선, 통계 검증 X, stake 50k, 사용자 명시 동의 2026-04-26)
  # 후보 풀: KRW 거래대금 top 30 자동 (research/notebooks/results/v2_strategy_g_pool.json)
  - {ticker: KRW-ORCA,     strategy: G, stake_amount_override: 50000}
  - {ticker: KRW-ZBT,      strategy: G, stake_amount_override: 50000}
  - {ticker: KRW-ENSO,     strategy: G, stake_amount_override: 50000}
  - {ticker: KRW-BTC,      strategy: G, stake_amount_override: 50000}
  - {ticker: KRW-ETH,      strategy: G, stake_amount_override: 50000}
  - {ticker: KRW-SONIC,    strategy: G, stake_amount_override: 50000}
  - {ticker: KRW-XRP,      strategy: G, stake_amount_override: 50000}
  - {ticker: KRW-MASK,     strategy: G, stake_amount_override: 50000}
  - {ticker: KRW-SAHARA,   strategy: G, stake_amount_override: 50000}
  - {ticker: KRW-CHIP,     strategy: G, stake_amount_override: 50000}
  - {ticker: KRW-USDT,     strategy: G, stake_amount_override: 50000}
  - {ticker: KRW-0G,       strategy: G, stake_amount_override: 50000}
  - {ticker: KRW-RAY,      strategy: G, stake_amount_override: 50000}
  - {ticker: KRW-AXS,      strategy: G, stake_amount_override: 50000}
  - {ticker: KRW-KAT,      strategy: G, stake_amount_override: 50000}
  - {ticker: KRW-MIRA,     strategy: G, stake_amount_override: 50000}
  - {ticker: KRW-AVNT,     strategy: G, stake_amount_override: 50000}
  - {ticker: KRW-SPK,      strategy: G, stake_amount_override: 50000}
  - {ticker: KRW-SOMI,     strategy: G, stake_amount_override: 50000}
  - {ticker: KRW-SOL,      strategy: G, stake_amount_override: 50000}
  - {ticker: KRW-INJ,      strategy: G, stake_amount_override: 50000}
  - {ticker: KRW-TRUMP,    strategy: G, stake_amount_override: 50000}
  - {ticker: KRW-AERO,     strategy: G, stake_amount_override: 50000}
  - {ticker: KRW-PENGU,    strategy: G, stake_amount_override: 50000}
  - {ticker: KRW-HYPER,    strategy: G, stake_amount_override: 50000}
  - {ticker: KRW-PIEVERSE, strategy: G, stake_amount_override: 50000}
  - {ticker: KRW-CKB,      strategy: G, stake_amount_override: 50000}
